<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HoneyJar &mdash; Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bd:#30363d;--ac:#f0b429;--rd:#f85149;--tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--gr:#3fb950;--fn:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;--r:8px;--r2:6px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px}
.brand{text-align:center;margin-bottom:30px;animation:fU .35s ease both}
.brand-ico{width:52px;height:52px;background:var(--ac);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;line-height:1}
.brand-name{font-size:24px;font-weight:800;letter-spacing:-.5px}.brand-name span{color:var(--ac)}
.brand-sub{font-family:var(--fm);font-size:11px;color:var(--tx3);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);width:360px;padding:28px;animation:fU .35s .06s ease both}
.card h2{font-size:15px;font-weight:700;margin-bottom:2px}
.card p{font-family:var(--fm);font-size:10px;color:var(--tx3);margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:var(--fm);font-size:13px;padding:9px 12px;border-radius:var(--r2);outline:none;transition:border-color .12s}
.field input:focus{border-color:var(--ac)}.field input::placeholder{color:var(--tx3)}
.btn-login{width:100%;padding:10px;background:var(--ac);border:none;color:#0d1117;font-family:var(--fn);font-size:14px;font-weight:700;border-radius:var(--r2);cursor:pointer;transition:opacity .12s;margin-top:4px}
.btn-login:hover{opacity:.87}
.err{font-family:var(--fm);font-size:11px;color:var(--rd);margin-top:10px;padding:7px 11px;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.18);border-radius:var(--r2)}
.foot{display:flex;align-items:center;gap:7px;margin-top:18px;font-family:var(--fm);font-size:10px;color:var(--tx3)}
.dot{width:7px;height:7px;background:var(--gr);border-radius:50%;position:relative}
.dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--gr);animation:ping 2s ease-out infinite}
@keyframes ping{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(2.4)}}
@keyframes fU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-ico">&#x1F36F;</div>
    <div class="brand-name">Honey<span>Jar</span></div>
    <div class="brand-sub">Honeypot Intelligence Platform v2</div>
  </div>
  <div class="card">
    <h2>Sign in</h2>
    <p>Enter your access key to continue</p>
    <form method="POST">
      <div class="field">
        <label>Access Key</label>
        <input type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autofocus required/>
      </div>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <button type="submit" class="btn-login">Continue &rarr;</button>
    </form>
    <div class="foot"><div class="dot"></div> All sensors active</div>
  </div>
</div>
</body>
</html>

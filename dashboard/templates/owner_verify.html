<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>HoneyJar &mdash; Owner Verify</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bd:#30363d;--ac:#f0b429;--rd:#f85149;--tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--fn:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;--r:8px;--r2:6px}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);width:340px;padding:28px}
h2{font-size:15px;font-weight:700;margin-bottom:2px}
p{font-family:var(--fm);font-size:10px;color:var(--tx3);margin-bottom:20px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:var(--fm);font-size:13px;padding:8px 12px;border-radius:var(--r2);outline:none;transition:border-color .12s;margin-bottom:14px}
.field input:focus{border-color:var(--ac)}.field input::placeholder{color:var(--tx3)}
.btn{width:100%;padding:10px;background:var(--ac);border:none;color:#0d1117;font-family:var(--fn);font-size:14px;font-weight:700;border-radius:var(--r2);cursor:pointer}
.err{font-family:var(--fm);font-size:11px;color:var(--rd);margin-top:10px;padding:7px 11px;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.18);border-radius:var(--r2)}
.back{display:block;text-align:center;margin-top:14px;font-family:var(--fm);font-size:10px;color:var(--tx3);text-decoration:none}
.back:hover{color:var(--ac)}
</style>
</head>
<body>
<div class="card">
  <h2>Owner verification</h2>
  <p>Settings require the owner key</p>
  <form method="POST">
    <div class="field">
      <label>Owner Key</label>
      <input type="password" name="owner_key" autofocus required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/>
    </div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <button type="submit" class="btn">Verify &rarr;</button>
  </form>
  <a href="/overview" class="back">&larr; Back to dashboard</a>
</div>
</body>
</html>
